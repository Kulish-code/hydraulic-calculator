<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>water vlastivosti</title>

    <link rel="stylesheet" href="styles.css"/>

    <script src="script.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Science+Gothic:wght@100..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>


<div class="box">
    <div class="header">
        <div class="header-label">Термодинамічний калькулятор</div>
        <h1>Теплофізичні властивості<br><span>води</span> на лінії насичення</h1>
        <div class="subtitle">Діапазон: 0 – 140 °C</div>
        <div class="results-title">Введіть нижче температуру води в °C</div>
        <input type="number" id="temp">
        <button onclick="pokazaty()">ОК</button>
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="results" id="results">
        <div class="divider"></div>
        <div class="cards-grid" id="cardsGrid"></div>
        <div class="range-note">Джерело: Додаток 1. Дані для цілих значень температури.</div>
    </div>
</div>

</body>
</html>
